services:
  fpm:
    build:
      context: .
      dockerfile: docker/Dockerfile.fpm
    volumes:
      - .:/var/www
    working_dir: /var/www
    environment:
      SAMENSTELLINGEN_DB_PATH: /var/www/tmp/samenstellingen.sqlite

  web:
    image: nginx:1.27-alpine
    depends_on:
      - fpm
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8181:80"
